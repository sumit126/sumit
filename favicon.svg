<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="6" fill="#1E0D22"/>
  <!-- Subtle gold border -->
  <rect x="2" y="2" width="60" height="60" rx="5" fill="none" stroke="#BCA371" stroke-width="0.7" opacity="0.5"/>
  <!-- WD monogram - W -->
  <text x="14" y="45"
    font-family="Cormorant Garamond, Georgia, serif"
    font-size="36"
    font-weight="600"
    font-style="italic"
    fill="#E8E2CD"
    text-anchor="start"
    letter-spacing="-2">W</text>
  <!-- WD monogram - D overlapping -->
  <text x="34" y="45"
    font-family="Cormorant Garamond, Georgia, serif"
    font-size="36"
    font-weight="600"
    font-style="italic"
    fill="#BCA371"
    text-anchor="start"
    letter-spacing="-2">D</text>
</svg>
